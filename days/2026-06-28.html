<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Ribbon Field | 2026-06-28</title>
  <style>
    :root {
      --bg0: #07111a;
      --bg1: #102338;
      --panel: rgba(9, 20, 31, 0.84);
      --panel-2: rgba(255, 255, 255, 0.04);
      --line: rgba(126, 228, 255, 0.12);
      --text: #ebf8ff;
      --muted: #9ab6c8;
      --accent: #7ce4ff;
      --accent2: #ffd868;
      --shadow: rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 18%, rgba(124, 228, 255, 0.16), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 216, 104, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .hero,
    .detail-block,
    .preview,
    .day-nav {
      border-radius: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px var(--shadow);
      backdrop-filter: blur(14px);
    }

    .hero {
      padding: 28px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.15;
    }

    .hero p,
    .detail-block p,
    .detail-block li {
      color: var(--muted);
      line-height: 1.7;
    }

    .date {
      margin: 0 0 10px;
      color: var(--accent2);
      font-size: 0.9rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .actions,
    .day-nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .actions {
      margin-top: 18px;
    }

    .primary,
    .secondary-link,
    .day-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc8);
      color: #062334;
    }

    .secondary-link,
    .day-link {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .day-nav {
      justify-content: space-between;
      margin-top: 18px;
      padding: 18px;
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
      gap: 18px;
      margin-top: 22px;
    }

    .stack {
      display: grid;
      gap: 18px;
    }

    .detail-block {
      padding: 22px;
    }

    .detail-block h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    .link-list {
      display: grid;
      gap: 8px;
      padding-left: 18px;
      margin: 12px 0 0;
    }

    .link-list a {
      color: var(--accent);
    }

    .preview {
      padding: 18px;
      position: sticky;
      top: 20px;
      height: fit-content;
    }

    .preview h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    iframe {
      width: 100%;
      height: 520px;
      border: 0;
      border-radius: 16px;
      background: rgba(0, 0, 0, 0.25);
    }

    @media (max-width: 960px) {
      .content {
        grid-template-columns: 1fr;
      }

      .preview {
        position: static;
      }

      iframe {
        height: 420px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="date">2026.06.28</p>
      <h1>Audio Ribbon Field</h1>
      <p>波形線を面状のリボンへ広げ、複数レイヤーが干渉しながら揺れる最小サンプルです。 低域で大きな波、中域でリボンのねじれ、高域で発光ノイズを強めます。</p>
      <div class="actions">
        <a class="primary" href="../outputs/2026-06-28_audio_ribbon_field.html">サンプルを開く</a>
        <a class="secondary-link" href="../index.html">一覧へ戻る</a>
      </div>
    </section>

    <nav class="day-nav" aria-label="日付移動">
      <a class="day-link" href="../days/2026-06-27.html">← 2026.06.27</a>
      <a class="day-link" href="../days/2026-06-29.html">2026.06.29 →</a>
    </nav>

    <section class="content">
      <div class="stack">
        
      <section class="detail-block">
        <h2>この日の情報</h2>
        <p>
          この日のレポート本文はまだファイルとして保存されていません。
          現在はサンプル情報と概要のみを表示しています。
          今後は <code>reports/YYYY-MM-DD.json</code> を追加すると、この欄に日次レポートをそのまま載せられます。
        </p>
      </section>
    
        
      </div>

      <aside class="preview">
        <h2>サンプルプレビュー</h2>
        <iframe src="../outputs/2026-06-28_audio_ribbon_field.html" loading="lazy" title="Audio Ribbon Field"></iframe>
      </aside>
    </section>
  </main>
</body>
</html>
