<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Signal Breakup</title>
  <style>
    :root {
      --bg0: #050b12;
      --bg1: #102136;
      --panel: rgba(8, 18, 28, 0.82);
      --text: #eef8ff;
      --muted: #9bb7c8;
      --accent: #7ce4ff;
      --accent2: #ffd868;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 16% 18%, rgba(124, 228, 255, 0.16), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 216, 104, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: rgba(8, 18, 28, 0.82);
      border: 1px solid rgba(124, 228, 255, 0.1);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.35;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc7);
      color: #062334;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }

    .meta strong { color: var(--accent2); }

    .stage {
      position: relative;
      min-height: 680px;
      overflow: hidden;
      border-radius: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(8, 14, 22, 0.4), rgba(6, 11, 18, 0.96));
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px;
    }

    .badge, .hint {
      background: rgba(8, 18, 28, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--muted);
      max-width: 360px;
    }

    .badge strong { color: var(--text); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 520px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Audio Signal Breakup</h1>
      <p>
        音量と帯域に応じて、ノイズ、走査線、RGB ずれ、信号の乱れ方が変わる最小サンプルです。
        低域で大域の揺れ、中域で走査線の歪み、高域でノイズと色ずれを強めます。
      </p>

      <div class="controls">
        <button class="primary" id="micButton">マイク入力を使う</button>
        <button class="secondary" id="demoButton">デモ信号で動かす</button>
      </div>

      <div class="meta">
        <div><strong>テーマ:</strong> 音反応 / 信号崩れ / ポストFX</div>
        <div><strong>低域:</strong> 大域のうねり</div>
        <div><strong>中域:</strong> 走査線の歪み</div>
        <div><strong>高域:</strong> ノイズと RGB ずれ</div>
      </div>
    </aside>

    <main class="panel stage">
      <canvas id="canvas"></canvas>
      <div class="overlay">
        <div class="badge" id="status"><strong>現在:</strong> デモ信号で動作中</div>
        <div class="hint">
          次に足すなら、GLSL 化して `noise`, `scanline`, `rgb shift` を別 uniform で制御し、afterimage と組み合わせるのが自然です。
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let time = 0;

    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let mode = "demo";

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.floor(rect.width * DPR);
      height = Math.floor(rect.height * DPR);
      canvas.width = width;
      canvas.height = height;
    }

    function setStatus(text) {
      statusEl.innerHTML = `<strong>現在:</strong> ${text}`;
    }

    function getDemoBands(t) {
      return {
        low: Math.max(0.08, Math.sin(t * 0.7) * 0.28 + 0.34),
        mid: Math.max(0.08, Math.sin(t * 1.5 + 1.1) * 0.24 + 0.38),
        high: Math.max(0.05, Math.sin(t * 3.1 + 2.0) * 0.22 + 0.24)
      };
    }

    function getAudioBands() {
      if (!analyser || !dataArray) return getDemoBands(time);
      analyser.getByteFrequencyData(dataArray);
      const len = dataArray.length;
      const lowEnd = Math.floor(len * 0.16);
      const midEnd = Math.floor(len * 0.5);
      let low = 0, mid = 0, high = 0;

      for (let i = 0; i < lowEnd; i += 1) low += dataArray[i];
      for (let i = lowEnd; i < midEnd; i += 1) mid += dataArray[i];
      for (let i = midEnd; i < len; i += 1) high += dataArray[i];

      low = Math.min(1, (low / lowEnd) / 255 * 2.1);
      mid = Math.min(1, (mid / (midEnd - lowEnd)) / 255 * 2.0);
      high = Math.min(1, (high / (len - midEnd)) / 255 * 2.3);

      return { low, mid, high };
    }

    async function startMic() {
      stopMic();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        mode = "mic";
        setStatus("マイク入力で動作中");
      } catch (error) {
        mode = "demo";
        setStatus("マイクを使えなかったためデモ信号へ切り替え");
      }
    }

    function stopMic() {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = null;
      analyser = null;
      dataArray = null;
    }

    function render(bands) {
      const { low, mid, high } = bands;
      const cx = width * 0.5;
      const cy = height * 0.5;
      const fade = 0.1 + (1 - low) * 0.14;

      ctx.fillStyle = `rgba(6, 11, 18, ${fade})`;
      ctx.fillRect(0, 0, width, height);

      const waveRadius = 120 + low * 240;
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, waveRadius);
      glow.addColorStop(0, `rgba(124, 226, 255, ${0.08 + low * 0.18})`);
      glow.addColorStop(0.55, `rgba(255, 216, 104, ${0.04 + low * 0.08})`);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, waveRadius, 0, Math.PI * 2);
      ctx.fill();

      const scanSpacing = Math.max(4 * DPR, 10 - mid * 5);
      const scanJitter = 8 + mid * 22;
      for (let y = 0; y < height; y += scanSpacing) {
        const offset = Math.sin(y * 0.02 + time * 8) * scanJitter * (0.2 + mid);
        ctx.strokeStyle = `rgba(124, 226, 255, ${0.04 + mid * 0.14})`;
        ctx.lineWidth = 1 * DPR;
        ctx.beginPath();
        ctx.moveTo(0, y + offset);
        ctx.lineTo(width, y - offset * 0.4);
        ctx.stroke();
      }

      const chroma = 2 + high * 10;
      for (let i = 0; i < 120; i += 1) {
        const nx = (Math.sin(i * 12.9898 + time * 13.17) * 43758.5453) % 1;
        const ny = (Math.sin(i * 78.233 + time * 9.31) * 12345.6789) % 1;
        const x = Math.abs(nx) * width;
        const y = Math.abs(ny) * height;
        const size = 1 + high * 3;

        ctx.fillStyle = `rgba(255, 110, 140, ${0.02 + high * 0.12})`;
        ctx.fillRect(x - chroma, y, size, size);
        ctx.fillStyle = `rgba(120, 220, 255, ${0.03 + high * 0.14})`;
        ctx.fillRect(x, y, size, size);
        ctx.fillStyle = `rgba(110, 150, 255, ${0.02 + high * 0.12})`;
        ctx.fillRect(x + chroma, y, size, size);
      }

      const cols = 18;
      const rows = 12;
      const cellW = width / cols;
      const cellH = height / rows;
      ctx.strokeStyle = `rgba(124, 226, 255, ${0.06 + mid * 0.16})`;
      ctx.lineWidth = 1 * DPR;
      for (let y = 0; y <= rows; y += 1) {
        ctx.beginPath();
        for (let x = 0; x <= cols; x += 1) {
          const px = x * cellW;
          const py = y * cellH;
          const dx = px - cx;
          const dy = py - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const wave = Math.sin(dist * 0.02 - time * 2.3) * (low * 18 + mid * 10);
          const drift = Math.cos(py * 0.03 + time * 2.1) * mid * 8;
          const ny = py + wave + drift;
          if (x === 0) ctx.moveTo(px, ny);
          else ctx.lineTo(px, ny);
        }
        ctx.stroke();
      }
    }

    function tick() {
      time += 0.016;
      const bands = mode === "mic" ? getAudioBands() : getDemoBands(time);
      render(bands);
      requestAnimationFrame(tick);
    }

    document.getElementById("micButton").addEventListener("click", startMic);
    document.getElementById("demoButton").addEventListener("click", () => {
      stopMic();
      mode = "demo";
      setStatus("デモ信号で動作中");
    });

    window.addEventListener("resize", resize);
    window.addEventListener("beforeunload", stopMic);

    resize();
    setStatus("デモ信号で動作中");
    tick();
  </script>
</body>
</html>
