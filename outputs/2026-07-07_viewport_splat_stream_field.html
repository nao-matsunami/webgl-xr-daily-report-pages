<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Viewport Splat Stream Field</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #08090b;
      color: #f3f7f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: min(420px, calc(100vw - 36px));
      pointer-events: none;
    }

    .hud h1 {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .hud p {
      margin: 0;
      color: #b8c8c2;
      font-size: 12px;
      line-height: 1.55;
    }

    .meter {
      position: fixed;
      right: 18px;
      bottom: 16px;
      width: min(260px, calc(100vw - 36px));
      height: 8px;
      border: 1px solid rgba(238, 246, 242, .32);
      background: rgba(255, 255, 255, .05);
    }

    .meter::after {
      content: "";
      display: block;
      height: 100%;
      width: 62%;
      background: linear-gradient(90deg, #71f0bc, #e6d45c, #ff6a61);
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { width: 42%; }
      50% { width: 92%; }
    }
  </style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hud">
  <h1>Viewport Splat Stream Field</h1>
  <p>ポインタ周辺を「将来の視点」と見なし、近い領域ほど高ビットレートの splat、外側ほど粗い stream chunk として描き分けます。押している間は予測半径が広がります。</p>
</div>
<div class="meter" aria-hidden="true"></div>
<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl", { antialias: false, alpha: false });

const vertexSource = `
attribute vec2 position;
void main() {
  gl_Position = vec4(position, 0.0, 1.0);
}
`;

const fragmentSource = `
precision highp float;
uniform vec2 resolution;
uniform vec2 pointer;
uniform float time;
uniform float pressed;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
}

float splat(vec2 uv, vec2 center, vec2 scale, float angle) {
  vec2 p = uv - center;
  float s = sin(angle);
  float c = cos(angle);
  p = mat2(c, -s, s, c) * p;
  p /= scale;
  return exp(-dot(p, p) * 2.4);
}

vec3 palette(float t) {
  vec3 a = vec3(0.05, 0.08, 0.09);
  vec3 b = vec3(0.20, 0.62, 0.50);
  vec3 c = vec3(0.92, 0.78, 0.30);
  vec3 d = vec3(1.00, 0.25, 0.22);
  return mix(mix(a, b, smoothstep(0.05, 0.55, t)), mix(c, d, smoothstep(0.62, 1.0, t)), smoothstep(0.48, 0.92, t));
}

void main() {
  vec2 frag = gl_FragCoord.xy;
  vec2 uv = (frag * 2.0 - resolution) / min(resolution.x, resolution.y);
  vec2 m = (pointer * 2.0 - resolution) / min(resolution.x, resolution.y);

  float predictRadius = mix(0.42, 0.72, pressed) + 0.04 * sin(time * 1.7);
  float distToFutureView = length(uv - m);
  float priority = 1.0 - smoothstep(0.08, predictRadius, distToFutureView);
  float ring = abs(distToFutureView - predictRadius);

  vec2 streamCell = floor((uv + vec2(1.6)) * mix(9.0, 17.0, priority));
  float chunkId = hash(streamCell);
  float chunkAge = fract(chunkId + time * mix(0.05, 0.18, priority));
  float chunkPulse = smoothstep(0.05, 0.0, abs(chunkAge - 0.5) - 0.2);

  float field = 0.0;
  float heat = 0.0;
  for (int i = 0; i < 24; i++) {
    float fi = float(i);
    vec2 seed = vec2(hash(vec2(fi, 3.7)), hash(vec2(fi, 9.2)));
    vec2 drift = vec2(sin(time * (0.13 + seed.x) + fi), cos(time * (0.11 + seed.y) + fi * 1.7));
    vec2 center = (seed * 2.8 - 1.4) + 0.05 * drift;
    float localPriority = 1.0 - smoothstep(0.1, predictRadius + 0.18, length(center - m));
    float quantize = mix(0.18, 0.04, localPriority);
    center = floor(center / quantize) * quantize;
    vec2 scale = mix(vec2(0.15, 0.045), vec2(0.055, 0.020), localPriority);
    float angle = seed.x * 6.283 + time * (0.05 + seed.y * 0.08);
    float g = splat(uv, center, scale, angle);
    field += g * mix(0.42, 0.95, localPriority);
    heat += g * pow(localPriority, 2.0) * (0.45 + 0.55 * hash(seed * 19.0));
  }

  float coarseGrid = smoothstep(0.017, 0.0, min(abs(fract(uv.x * 9.0) - 0.5), abs(fract(uv.y * 9.0) - 0.5)));
  float fineGrid = smoothstep(0.012, 0.0, min(abs(fract(uv.x * 25.0) - 0.5), abs(fract(uv.y * 25.0) - 0.5)));
  float scan = smoothstep(0.02, 0.0, abs(fract((uv.y + time * 0.12) * 18.0) - 0.5));

  float bandwidth = priority * (0.72 + 0.28 * noise(uv * 4.0 + time * 0.15));
  vec3 color = palette(clamp(field * 0.48 + bandwidth * 0.55 + heat * 0.35, 0.0, 1.0));
  color += vec3(0.08, 0.16, 0.14) * coarseGrid * (1.0 - priority);
  color += vec3(0.26, 0.95, 0.72) * fineGrid * priority;
  color += vec3(1.0, 0.82, 0.32) * chunkPulse * (0.05 + 0.2 * priority);
  color += vec3(1.0, 0.24, 0.18) * smoothstep(0.018, 0.0, ring);
  color += vec3(0.65, 0.95, 0.86) * scan * priority * 0.16;

  float vignette = smoothstep(1.35, 0.2, length(uv));
  gl_FragColor = vec4(color * vignette, 1.0);
}
`;

function compile(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexSource));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentSource));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
  throw new Error(gl.getProgramInfoLog(program));
}
gl.useProgram(program);

const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

const position = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(position);
gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

const uniforms = {
  resolution: gl.getUniformLocation(program, "resolution"),
  pointer: gl.getUniformLocation(program, "pointer"),
  time: gl.getUniformLocation(program, "time"),
  pressed: gl.getUniformLocation(program, "pressed")
};

const state = {
  pointer: [window.innerWidth * 0.58, window.innerHeight * 0.45],
  pressed: 0
};

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
  state.pointer[0] = Math.min(state.pointer[0], canvas.width);
  state.pointer[1] = Math.min(state.pointer[1], canvas.height);
}

function setPointer(event) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  state.pointer[0] = (event.clientX - rect.left) * sx;
  state.pointer[1] = canvas.height - (event.clientY - rect.top) * sy;
}

window.addEventListener("resize", resize);
window.addEventListener("pointermove", setPointer);
window.addEventListener("pointerdown", (event) => {
  state.pressed = 1;
  setPointer(event);
});
window.addEventListener("pointerup", () => {
  state.pressed = 0;
});

resize();
const start = performance.now();
function frame(now) {
  gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
  gl.uniform2f(uniforms.pointer, state.pointer[0], state.pointer[1]);
  gl.uniform1f(uniforms.time, (now - start) / 1000);
  gl.uniform1f(uniforms.pressed, state.pressed);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
