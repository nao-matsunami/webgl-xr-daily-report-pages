<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Ribbon Field</title>
  <style>
    :root {
      --bg0: #050b12;
      --bg1: #102036;
      --panel: rgba(8, 18, 28, 0.82);
      --text: #eef8ff;
      --muted: #9bb7c8;
      --accent: #7ce4ff;
      --accent2: #ffd868;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 16% 18%, rgba(124, 228, 255, 0.16), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(255, 216, 104, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: rgba(8, 18, 28, 0.82);
      border: 1px solid rgba(124, 228, 255, 0.1);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.35;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc7);
      color: #062334;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }

    .meta strong { color: var(--accent2); }

    .stage {
      position: relative;
      min-height: 680px;
      overflow: hidden;
      border-radius: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(8, 14, 22, 0.42), rgba(6, 11, 18, 0.96));
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px;
    }

    .badge, .hint {
      background: rgba(8, 18, 28, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--muted);
      max-width: 360px;
    }

    .badge strong { color: var(--text); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 520px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="panel">
      <h1>Audio Ribbon Field</h1>
      <p>
        波形線を面状のリボンへ広げ、複数レイヤーが干渉しながら揺れる最小サンプルです。
        低域で大きな波、中域でリボンのねじれ、高域で発光ノイズを強めます。
      </p>

      <div class="controls">
        <button class="primary" id="micButton">マイク入力を使う</button>
        <button class="secondary" id="demoButton">デモ信号で動かす</button>
      </div>

      <div class="meta">
        <div><strong>テーマ:</strong> 音反応 / リボン場 / 干渉面</div>
        <div><strong>低域:</strong> 大域のうねり</div>
        <div><strong>中域:</strong> リボンの分裂とねじれ</div>
        <div><strong>高域:</strong> 発光ノイズ</div>
      </div>
    </aside>

    <main class="panel stage">
      <canvas id="canvas"></canvas>
      <div class="overlay">
        <div class="badge" id="status"><strong>現在:</strong> デモ信号で動作中</div>
        <div class="hint">
          次に足すなら、リボンを WebGL/GLSL のストリップ状メッシュに置き換えて、加算合成と残像を別パス化するのが自然です。
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let time = 0;

    let audioContext = null;
    let analyser = null;
    let timeData = null;
    let freqData = null;
    let stream = null;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.floor(rect.width * DPR);
      height = Math.floor(rect.height * DPR);
      canvas.width = width;
      canvas.height = height;
    }

    function setStatus(text) {
      statusEl.innerHTML = `<strong>現在:</strong> ${text}`;
    }

    function getDemoBands(t) {
      return {
        low: Math.max(0.08, Math.sin(t * 0.72) * 0.28 + 0.34),
        mid: Math.max(0.08, Math.sin(t * 1.42 + 1.05) * 0.24 + 0.38),
        high: Math.max(0.05, Math.sin(t * 3.05 + 2.0) * 0.22 + 0.24)
      };
    }

    function buildDemoWave(low, mid, high) {
      const len = 220;
      const arr = new Float32Array(len);
      for (let i = 0; i < len; i += 1) {
        const x = i / (len - 1);
        arr[i] =
          Math.sin(x * Math.PI * 3 + time * 2.0) * (0.24 + low * 0.36) +
          Math.sin(x * Math.PI * 9 + time * 4.3) * (0.08 + mid * 0.12) +
          Math.sin(x * Math.PI * 27 + time * 8.8) * (0.02 + high * 0.08);
      }
      return arr;
    }

    function getAudioState() {
      const demoBands = getDemoBands(time);
      if (!analyser || !timeData || !freqData) {
        return { bands: demoBands, wave: buildDemoWave(demoBands.low, demoBands.mid, demoBands.high) };
      }

      analyser.getByteTimeDomainData(timeData);
      analyser.getByteFrequencyData(freqData);

      const len = freqData.length;
      const lowEnd = Math.floor(len * 0.16);
      const midEnd = Math.floor(len * 0.5);
      let low = 0, mid = 0, high = 0;

      for (let i = 0; i < lowEnd; i += 1) low += freqData[i];
      for (let i = lowEnd; i < midEnd; i += 1) mid += freqData[i];
      for (let i = midEnd; i < len; i += 1) high += freqData[i];

      low = Math.min(1, (low / lowEnd) / 255 * 2.1);
      mid = Math.min(1, (mid / (midEnd - lowEnd)) / 255 * 2.0);
      high = Math.min(1, (high / (len - midEnd)) / 255 * 2.3);

      const wave = new Float32Array(timeData.length);
      for (let i = 0; i < timeData.length; i += 1) wave[i] = (timeData[i] - 128) / 128;

      return { bands: { low, mid, high }, wave };
    }

    async function startMic() {
      stopMic();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        timeData = new Uint8Array(analyser.fftSize);
        freqData = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        setStatus("マイク入力で動作中");
      } catch (error) {
        setStatus("マイクを使えなかったためデモ信号へ切り替え");
      }
    }

    function stopMic() {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      if (audioContext && audioContext.state !== "closed") audioContext.close();
      audioContext = null;
      analyser = null;
      timeData = null;
      freqData = null;
    }

    function drawRibbon(wave, bands, config) {
      const { low, mid, high } = bands;
      const cy = height * 0.5 + config.offsetY;
      const amp = (70 + low * 110) * config.ampMul;
      const widthMul = 16 + mid * 34;

      ctx.beginPath();
      for (let i = 0; i < wave.length; i += 1) {
        const x = (i / (wave.length - 1)) * width;
        const breakup = Math.sin(i * config.breakFreq + time * config.breakSpeed) * high * 7;
        const twist = Math.cos(i * config.twistFreq + time * config.twistSpeed) * mid * 12;
        const y = cy + wave[i] * amp + breakup + twist;
        if (i === 0) ctx.moveTo(x, y - widthMul);
        else ctx.lineTo(x, y - widthMul);
      }
      for (let i = wave.length - 1; i >= 0; i -= 1) {
        const x = (i / (wave.length - 1)) * width;
        const breakup = Math.sin(i * config.breakFreq + time * config.breakSpeed) * high * 7;
        const twist = Math.cos(i * config.twistFreq + time * config.twistSpeed) * mid * 12;
        const y = cy + wave[i] * amp + breakup + twist;
        ctx.lineTo(x, y + widthMul);
      }
      ctx.closePath();

      const gradient = ctx.createLinearGradient(0, cy - 80, 0, cy + 80);
      gradient.addColorStop(0, config.colorTop(high, mid));
      gradient.addColorStop(1, config.colorBottom(high, mid));
      ctx.fillStyle = gradient;
      ctx.shadowColor = config.shadow(high);
      ctx.shadowBlur = 10 + high * 24;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    function render(state) {
      const { bands, wave } = state;
      const { low, mid, high } = bands;
      const cx = width * 0.5;
      const cy = height * 0.5;

      ctx.fillStyle = `rgba(6, 11, 18, ${0.11 + (1 - low) * 0.14})`;
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 170 + low * 220);
      glow.addColorStop(0, `rgba(124, 226, 255, ${0.08 + low * 0.18})`);
      glow.addColorStop(0.55, `rgba(255, 216, 104, ${0.04 + low * 0.08})`);
      glow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(cx, cy, 170 + low * 220, 0, Math.PI * 2);
      ctx.fill();

      drawRibbon(wave, bands, {
        offsetY: -26 - mid * 20,
        ampMul: 0.78,
        breakFreq: 0.48,
        breakSpeed: 12,
        twistFreq: 0.11,
        twistSpeed: 5.8,
        colorTop: (h, m) => `rgba(255, 124, 144, ${0.08 + h * 0.18 + m * 0.04})`,
        colorBottom: (h, m) => `rgba(255, 124, 144, ${0.02 + h * 0.08})`,
        shadow: (h) => `rgba(255, 124, 144, ${0.08 + h * 0.16})`
      });

      drawRibbon(wave, bands, {
        offsetY: 0,
        ampMul: 1,
        breakFreq: 0.62,
        breakSpeed: 15,
        twistFreq: 0.15,
        twistSpeed: 7.2,
        colorTop: (h, m) => `rgba(124, 226, 255, ${0.12 + h * 0.12 + m * 0.08})`,
        colorBottom: (h, m) => `rgba(124, 226, 255, ${0.04 + h * 0.06})`,
        shadow: (h) => `rgba(124, 226, 255, ${0.1 + h * 0.18})`
      });

      drawRibbon(wave, bands, {
        offsetY: 28 + mid * 20,
        ampMul: 0.88,
        breakFreq: 0.76,
        breakSpeed: 17,
        twistFreq: 0.17,
        twistSpeed: 8.4,
        colorTop: (h, m) => `rgba(110, 160, 255, ${0.08 + h * 0.18 + m * 0.04})`,
        colorBottom: (h, m) => `rgba(110, 160, 255, ${0.02 + h * 0.08})`,
        shadow: (h) => `rgba(110, 160, 255, ${0.08 + h * 0.16})`
      });

      const dots = 50;
      for (let i = 0; i < dots; i += 1) {
        const x = (Math.sin(i * 17.23 + time * 6.2) * 0.5 + 0.5) * width;
        const y = (Math.cos(i * 12.91 + time * 4.4) * 0.5 + 0.5) * height;
        const size = 1 + high * 2.3;
        ctx.fillStyle = `rgba(124, 226, 255, ${0.02 + high * 0.08})`;
        ctx.fillRect(x, y, size, size);
      }
    }

    function tick() {
      time += 0.016;
      render(getAudioState());
      requestAnimationFrame(tick);
    }

    document.getElementById("micButton").addEventListener("click", startMic);
    document.getElementById("demoButton").addEventListener("click", () => {
      stopMic();
      setStatus("デモ信号で動作中");
    });

    window.addEventListener("resize", resize);
    window.addEventListener("beforeunload", stopMic);

    resize();
    setStatus("デモ信号で動作中");
    tick();
  </script>
</body>
</html>
