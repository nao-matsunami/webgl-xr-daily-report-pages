<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LOD Fog Audio Scope</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #080910;
      color: #e8f0ff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: min(420px, calc(100vw - 36px));
      color: rgba(232, 240, 255, 0.86);
      font-size: 13px;
      line-height: 1.45;
      text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
      pointer-events: none;
    }
    .hud b {
      color: #ffffff;
      font-size: 14px;
      font-weight: 650;
    }
    .legend {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 8px;
      margin-top: 10px;
    }
    .swatch {
      width: 18px;
      height: 8px;
      border-radius: 999px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="hud">
    <b>LOD Fog Audio Scope</b><br>
    Move the pointer to steer the budget lens. Hold or tap to inject an audio impulse.
    <div class="legend">
      <span class="swatch" style="background:#69f0a8"></span><span>valid high LOD</span>
      <span class="swatch" style="background:#f6bd62"></span><span>fogged retry cooldown</span>
      <span class="swatch" style="background:#ff4d8d"></span><span>stale prediction residue</span>
      <span class="swatch" style="background:#48d7ff"></span><span>scan / depth annotation</span>
    </div>
  </div>
  <script type="x-shader/x-vertex" id="vs">
    attribute vec2 position;
    void main() {
      gl_Position = vec4(position, 0.0, 1.0);
    }
  </script>
  <script type="x-shader/x-fragment" id="fs">
    precision highp float;
    uniform vec2 resolution;
    uniform vec2 pointer;
    uniform float time;
    uniform float impulse;
    uniform float down;

    float hash(vec2 p) {
      p = fract(p * vec2(123.34, 456.21));
      p += dot(p, p + 45.32);
      return fract(p.x * p.y);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(
        mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
        mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
        u.y
      );
    }

    float ring(vec2 uv, vec2 c, float r, float w) {
      return 1.0 - smoothstep(w, w + 0.006, abs(length(uv - c) - r));
    }

    float boxLine(vec2 p, vec2 b, float w) {
      vec2 d = abs(p) - b;
      float outside = length(max(d, 0.0));
      float inside = min(max(d.x, d.y), 0.0);
      return 1.0 - smoothstep(w, w + 0.003, abs(outside + inside));
    }

    void main() {
      vec2 frag = gl_FragCoord.xy;
      vec2 uv = frag / resolution;
      vec2 aspect = vec2(resolution.x / resolution.y, 1.0);
      vec2 p = (uv - 0.5) * aspect;
      vec2 m = (pointer - 0.5) * aspect;

      vec2 gridUv = uv * vec2(11.0, 7.0);
      vec2 cell = floor(gridUv);
      vec2 local = fract(gridUv) - 0.5;
      vec2 centerUv = (cell + 0.5) / vec2(11.0, 7.0);
      vec2 center = (centerUv - 0.5) * aspect;

      float id = hash(cell);
      float depth = smoothstep(-0.55, 0.55, center.y + 0.12 * sin(center.x * 6.0));
      vec2 predicted = vec2(0.36 * sin(time * 0.34), 0.24 * cos(time * 0.23));
      float currentBudget = smoothstep(0.46, 0.04, length(center - m));
      float predictedBudget = smoothstep(0.50, 0.06, length(center - predicted));
      float stale = abs(currentBudget - predictedBudget);

      float fogWave = noise(center * 4.0 + vec2(time * 0.05, -time * 0.03));
      float fog = smoothstep(0.12, 0.86, depth + 0.36 * fogWave - 0.22 * impulse);
      float retry = smoothstep(0.48, 0.9, fog + 0.35 * sin(time * 1.5 + id * 8.0));
      float valid = currentBudget * (1.0 - retry * 0.62);
      float fail = smoothstep(0.82, 1.0, retry * (0.5 + stale + down * 0.35));

      float tile = smoothstep(0.47, 0.42, max(abs(local.x), abs(local.y)));
      float border = boxLine(local, vec2(0.46), 0.012);
      float splat = 0.0;
      for (int i = 0; i < 5; i++) {
        float fi = float(i);
        vec2 seed = vec2(hash(cell + fi), hash(cell + fi + 11.0));
        vec2 sp = (seed - 0.5) * 0.72;
        float r = 0.10 + 0.055 * hash(cell + fi + 23.0);
        splat += exp(-dot((local - sp) / r, (local - sp) / r));
      }
      splat = smoothstep(0.08, 1.5, splat);

      float scan = ring(p, m, 0.18 + impulse * 0.10, 0.006);
      scan += ring(p, predicted, 0.24, 0.004) * 0.55;
      float depthGate = smoothstep(0.48, 0.5, abs(fract(uv.y * 18.0 + time * 0.12) - 0.5));
      float annotation = scan + border * depthGate * (0.35 + valid);

      vec3 base = mix(vec3(0.025, 0.030, 0.055), vec3(0.05, 0.07, 0.10), uv.y);
      vec3 color = base;
      color += tile * splat * valid * vec3(0.20, 0.95, 0.58);
      color += tile * retry * vec3(0.95, 0.58, 0.18) * (0.22 + fog);
      color += tile * stale * vec3(1.0, 0.18, 0.54) * (0.20 + 0.75 * impulse);
      color += tile * fail * vec3(1.0, 0.05, 0.10) * 0.72;
      color += annotation * vec3(0.12, 0.72, 1.0);
      color = mix(color, vec3(0.62, 0.66, 0.78), fog * 0.26);
      color += pow(max(0.0, 1.0 - length(p - m) * 1.6), 4.0) * vec3(0.06, 0.12, 0.18);
      color *= 0.88 + 0.12 * noise(uv * resolution * 0.45 + time);

      gl_FragColor = vec4(pow(color, vec3(0.92)), 1.0);
    }
  </script>
  <script>
    const canvas = document.getElementById('gl');
    const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
    const pointer = { x: 0.52, y: 0.48 };
    let down = 0;
    let impulse = 0;

    function compile(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    const position = gl.getAttribLocation(program, 'position');
    gl.enableVertexAttribArray(position);
    gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

    const uniforms = {
      resolution: gl.getUniformLocation(program, 'resolution'),
      pointer: gl.getUniformLocation(program, 'pointer'),
      time: gl.getUniformLocation(program, 'time'),
      impulse: gl.getUniformLocation(program, 'impulse'),
      down: gl.getUniformLocation(program, 'down')
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    function setPointer(event) {
      pointer.x = event.clientX / innerWidth;
      pointer.y = 1 - event.clientY / innerHeight;
      impulse = Math.min(1, impulse + 0.08);
    }

    addEventListener('resize', resize);
    addEventListener('pointermove', setPointer);
    addEventListener('pointerdown', (event) => {
      setPointer(event);
      down = 1;
      impulse = 1;
    });
    addEventListener('pointerup', () => { down = 0; });
    resize();

    const start = performance.now();
    function frame(now) {
      const t = (now - start) * 0.001;
      impulse = Math.max(0, impulse * 0.92 + down * 0.018 + Math.pow(Math.max(0, Math.sin(t * 2.8)), 18.0) * 0.035);
      gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
      gl.uniform2f(uniforms.pointer, pointer.x, pointer.y);
      gl.uniform1f(uniforms.time, t);
      gl.uniform1f(uniforms.impulse, impulse);
      gl.uniform1f(uniforms.down, down);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
