<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Particle Field</title>
  <style>
    :root {
      --bg0: #071019;
      --bg1: #13273c;
      --panel: rgba(8, 20, 31, 0.82);
      --line: rgba(120, 220, 255, 0.16);
      --text: #ecf8ff;
      --muted: #99b6c8;
      --accent: #7de8ff;
      --accent2: #ffd86a;
      --shadow: rgba(0, 0, 0, 0.32);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 15% 18%, rgba(125, 232, 255, 0.16), transparent 22%),
        radial-gradient(circle at 84% 12%, rgba(255, 216, 106, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(125, 232, 255, 0.12);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 40px var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.35;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc8);
      color: #062334;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.88rem;
    }

    .meta strong { color: var(--accent2); }

    .stage {
      position: relative;
      min-height: 680px;
      overflow: hidden;
      border-radius: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      background:
        radial-gradient(circle at center, rgba(125, 232, 255, 0.06), transparent 34%),
        linear-gradient(180deg, rgba(10, 20, 30, 0.6), rgba(10, 18, 27, 0.92));
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 18px;
    }

    .badge, .hint {
      background: rgba(8, 20, 31, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
      padding: 12px 14px;
      max-width: 340px;
    }

    .badge strong { color: var(--text); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 520px; }
    }
  

    .home-link {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(8, 18, 28, 0.82);
      border: 1px solid rgba(124, 228, 255, 0.16);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      color: var(--text, #eef8ff);
      font: 600 0.9rem/1 "Avenir Next", "Hiragino Sans", sans-serif;
    }

    .home-link:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 228, 255, 0.3);
    }

    @media (max-width: 720px) {
      .home-link {
        top: 12px;
        right: 12px;
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <a class="home-link" href="../index.html">トップへ戻る / Back to top</a>
  <div class="layout">
    <aside class="panel">
      <h1>Audio Particle Field</h1>
      <p>
        音量に応じて粒子の広がり、発光、速度が変化する最小サンプルです。
        マイクが使えれば実入力、使えなければ自動デモ信号で動きます。
      </p>

      <div class="controls">
        <button class="primary" id="micButton">マイク入力を使う</button>
        <button class="secondary" id="demoButton">デモ信号で動かす</button>
      </div>

      <div class="meta" id="meta">
        <div><strong>テーマ:</strong> 音反応 / パーティクル / 空間演出</div>
        <div><strong>最小機能:</strong> 音量で速度・半径・色味を変える</div>
        <div><strong>次の拡張:</strong> three.js化、ポストプロセス、周波数帯別反応</div>
      </div>
    </aside>

    <main class="panel stage">
      <canvas id="canvas"></canvas>
      <div class="overlay">
        <div class="badge" id="status"><strong>現在:</strong> デモ信号待機中</div>
        <div class="hint">
          次段階では `低域 / 中域 / 高域` でレイヤーを分けると、音反応の見え方がかなり良くなります。
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let centerX = 0;
    let centerY = 0;

    const particleCount = 180;
    const particles = [];
    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let mode = "demo";
    let time = 0;

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.floor(rect.width * DPR);
      height = Math.floor(rect.height * DPR);
      canvas.width = width;
      canvas.height = height;
      centerX = width * 0.5;
      centerY = height * 0.5;
    }

    function createParticles() {
      particles.length = 0;
      for (let i = 0; i < particleCount; i += 1) {
        particles.push({
          angle: Math.random() * Math.PI * 2,
          radius: 40 + Math.random() * 220,
          speed: 0.002 + Math.random() * 0.004,
          size: 1 + Math.random() * 3,
          seed: Math.random() * 1000
        });
      }
    }

    function setStatus(text) {
      statusEl.innerHTML = `<strong>現在:</strong> ${text}`;
    }

    function setMode(nextMode) {
      mode = nextMode;
      if (mode === "demo") {
        setStatus("デモ信号で動作中");
      } else {
        setStatus("マイク入力で動作中");
      }
    }

    function getDemoLevel(t) {
      return Math.max(0.08, Math.sin(t * 1.4) * 0.28 + Math.sin(t * 2.8) * 0.18 + 0.34);
    }

    function getAudioLevel() {
      if (!analyser || !dataArray) return getDemoLevel(time);
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i += 1) sum += dataArray[i];
      return Math.min(1, (sum / dataArray.length / 255) * 1.9);
    }

    async function startMic() {
      stopMic();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        setMode("mic");
      } catch (error) {
        setMode("demo");
        setStatus("マイクを使えなかったためデモ信号へ切り替え");
      }
    }

    function stopMic() {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = null;
      analyser = null;
      dataArray = null;
    }

    function draw(level) {
      ctx.fillStyle = "rgba(6, 14, 24, 0.16)";
      ctx.fillRect(0, 0, width, height);

      const glow = 22 + level * 90;
      const ring = 90 + level * 180;

      const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, ring);
      gradient.addColorStop(0, `rgba(125, 232, 255, ${0.16 + level * 0.18})`);
      gradient.addColorStop(0.55, `rgba(255, 216, 106, ${0.05 + level * 0.08})`);
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, ring, 0, Math.PI * 2);
      ctx.fill();

      for (const p of particles) {
        const radius = p.radius + Math.sin(time * 0.7 + p.seed) * 14 + level * 130;
        const angle = p.angle + time * (0.8 + level * 2.6) * p.speed * 120;
        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle * 1.2) * radius * 0.55;
        const size = p.size + level * 4.4;

        ctx.beginPath();
        ctx.fillStyle = `hsla(${190 + level * 80 + p.seed % 60}, 92%, ${60 + level * 12}%, ${0.32 + level * 0.5})`;
        ctx.shadowColor = `rgba(125, 232, 255, ${0.2 + level * 0.45})`;
        ctx.shadowBlur = glow;
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;

      ctx.strokeStyle = `rgba(125, 232, 255, ${0.12 + level * 0.2})`;
      ctx.lineWidth = 1.5 * DPR;
      ctx.beginPath();
      ctx.arc(centerX, centerY, ring * 0.52, 0, Math.PI * 2);
      ctx.stroke();
    }

    function tick() {
      time += 0.016;
      const level = mode === "mic" ? getAudioLevel() : getDemoLevel(time);
      draw(level);
      requestAnimationFrame(tick);
    }

    document.getElementById("micButton").addEventListener("click", startMic);
    document.getElementById("demoButton").addEventListener("click", () => {
      stopMic();
      setMode("demo");
    });

    window.addEventListener("resize", resize);
    window.addEventListener("beforeunload", stopMic);

    resize();
    createParticles();
    setMode("demo");
    tick();
  </script>
</body>
</html>
