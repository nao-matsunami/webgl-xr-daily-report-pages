<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Export Resolution glTF Scope</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #070a0f;
      color: #e8f6ff;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: min(520px, calc(100vw - 36px));
      line-height: 1.45;
      font-size: 12px;
      color: rgba(232, 246, 255, 0.86);
      text-shadow: 0 1px 12px #000;
      pointer-events: none;
    }
    .hud b {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="hud">
    <b>Export Resolution glTF Scope</b><br />
    pointer: working pivot / hold: muxer pressure / space: 8K spike / G: glTF-SPZ gate
  </div>
  <script>
    const canvas = document.getElementById("gl");
    const gl = canvas.getContext("webgl", { antialias: false, alpha: false });
    const vertexSource = `
      attribute vec2 position;
      void main() {
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;
    const fragmentSource = `
      precision highp float;
      uniform vec2 resolution;
      uniform vec2 pointer;
      uniform vec2 history;
      uniform float time;
      uniform float hold;
      uniform float spike;
      uniform float gate;

      float hash(vec2 p) {
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
          u.y
        );
      }

      float line(float value, float target, float width) {
        return 1.0 - smoothstep(0.0, width, abs(value - target));
      }

      mat2 rot(float a) {
        float s = sin(a);
        float c = cos(a);
        return mat2(c, -s, s, c);
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / resolution.xy;
        vec2 p = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
        vec2 mp = (pointer * 2.0 - 1.0) * vec2(resolution.x / min(resolution.x, resolution.y), 1.0);
        vec2 hp = (history * 2.0 - 1.0) * vec2(resolution.x / min(resolution.x, resolution.y), 1.0);

        vec2 plane = rot(0.55 + 0.18 * sin(time * 0.27)) * p;
        float grid = max(line(fract(plane.x * 5.0), 0.5, 0.025), line(fract(plane.y * 5.0), 0.5, 0.025));
        float major = max(line(fract(plane.x * 1.25), 0.5, 0.018), line(fract(plane.y * 1.25), 0.5, 0.018));

        float dNow = length(p - mp);
        float dHist = length(p - hp);
        float pivot = smoothstep(0.22, 0.02, dNow);
        float finalize = smoothstep(0.38, 0.02, dHist) * (0.35 + 0.65 * hold);
        float lag = smoothstep(0.02, 0.48, abs(dNow - dHist));

        vec2 cell = floor((uv - 0.5) * vec2(18.0, 10.0));
        float h = hash(cell + floor(time * 0.7));
        float stream = smoothstep(0.33, 0.9, h + gate * 0.22 - spike * 0.14);
        float unsupported = smoothstep(0.72, 0.98, noise(cell * 0.71 + time * 0.12) + spike * 0.42 + hold * 0.18);
        float chunk = smoothstep(0.015, 0.0, min(fract((uv.x - 0.5) * 18.0), fract((uv.y - 0.5) * 10.0)));

        float fog = 0.0;
        fog += noise(p * 2.2 + vec2(time * 0.05, -time * 0.03)) * 0.35;
        fog += noise(p * 5.5 - vec2(time * 0.09, time * 0.04)) * 0.18;
        fog *= smoothstep(1.25, -0.15, length(p));

        float rings = 0.0;
        rings += line(length(p - mp), 0.18 + spike * 0.18, 0.014);
        rings += line(length(p - hp), 0.30 + hold * 0.12, 0.018);
        rings += line(length(p), 0.74 + 0.03 * sin(time), 0.01) * gate;

        vec3 base = mix(vec3(0.015, 0.025, 0.035), vec3(0.08, 0.13, 0.16), fog);
        vec3 gridColor = mix(vec3(0.05, 0.25, 0.25), vec3(0.18, 0.42, 0.45), major);
        vec3 color = base + gridColor * grid * (0.42 + 0.45 * gate);
        color += vec3(0.22, 0.95, 0.55) * stream * chunk * 0.8;
        color += vec3(1.0, 0.25, 0.16) * unsupported * chunk * 1.15;
        color += vec3(0.1, 0.55, 1.0) * pivot * 0.75;
        color += vec3(1.0, 0.78, 0.18) * finalize * 0.82;
        color += vec3(1.0, 0.22, 0.85) * lag * (0.08 + 0.22 * hold);
        color += vec3(0.7, 0.95, 1.0) * rings;
        color += vec3(0.0, 0.12, 0.18) * smoothstep(0.78, 0.05, abs(uv.y - (0.16 + 0.05 * sin(time))));
        color *= 1.0 - 0.28 * smoothstep(0.45, 1.45, length(p));

        gl_FragColor = vec4(pow(color, vec3(0.92)), 1.0);
      }
    `;

    function compile(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexSource));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentSource));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
    const position = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(position);
    gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

    const uniforms = {
      resolution: gl.getUniformLocation(program, "resolution"),
      pointer: gl.getUniformLocation(program, "pointer"),
      history: gl.getUniformLocation(program, "history"),
      time: gl.getUniformLocation(program, "time"),
      hold: gl.getUniformLocation(program, "hold"),
      spike: gl.getUniformLocation(program, "spike"),
      gate: gl.getUniformLocation(program, "gate")
    };

    let pointerX = 0.55;
    let pointerY = 0.53;
    let historyX = pointerX;
    let historyY = pointerY;
    let hold = 0;
    let spike = 0;
    let gate = 1;

    function setPointer(event) {
      const rect = canvas.getBoundingClientRect();
      pointerX = (event.clientX - rect.left) / rect.width;
      pointerY = 1 - (event.clientY - rect.top) / rect.height;
    }

    addEventListener("pointermove", setPointer);
    addEventListener("pointerdown", (event) => {
      setPointer(event);
      hold = 1;
    });
    addEventListener("pointerup", () => {
      hold = 0;
    });
    addEventListener("keydown", (event) => {
      if (event.code === "Space") spike = 1;
      if (event.key.toLowerCase() === "g") gate = gate > 0.5 ? 0 : 1;
    });

    function resize() {
      const dpr = Math.min(devicePixelRatio || 1, 2);
      const width = Math.floor(innerWidth * dpr);
      const height = Math.floor(innerHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        gl.viewport(0, 0, width, height);
      }
    }

    function frame(now) {
      resize();
      const t = now * 0.001;
      historyX += (pointerX - historyX) * 0.035;
      historyY += (pointerY - historyY) * 0.035;
      spike *= 0.94;

      gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
      gl.uniform2f(uniforms.pointer, pointerX, pointerY);
      gl.uniform2f(uniforms.history, historyX, historyY);
      gl.uniform1f(uniforms.time, t);
      gl.uniform1f(uniforms.hold, hold);
      gl.uniform1f(uniforms.spike, spike);
      gl.uniform1f(uniforms.gate, gate);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
