<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDF Focus Splat Membrane</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #081016;
      color: #eef7f8;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: 560px;
      pointer-events: none;
      text-shadow: 0 1px 18px rgba(0, 0, 0, 0.5);
    }

    .hud h1 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .hud p {
      margin: 0;
      font-size: 12px;
      line-height: 1.55;
      color: rgba(220, 236, 235, 0.82);
    }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div class="hud">
    <h1>SDF Focus Splat Membrane</h1>
    <p>ポインタ周辺だけ SDF 輪郭と疑似 splat が細かくなります。押している間は焦点半径が広がり、情報膜の読みやすい領域が拡張します。</p>
  </div>

  <script>
    const canvas = document.getElementById("view");
    const gl = canvas.getContext("webgl", { antialias: false, alpha: false });

    if (!gl) {
      document.body.innerHTML = "<p>WebGL is not available.</p>";
      throw new Error("WebGL unavailable");
    }

    const vertexShaderSource = `
      attribute vec2 position;
      varying vec2 vUv;

      void main() {
        vUv = position * 0.5 + 0.5;
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;

    const fragmentShaderSource = `
      precision highp float;

      uniform vec2 resolution;
      uniform vec2 pointer;
      uniform float time;
      uniform float pressed;
      varying vec2 vUv;

      float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      float sdBox(vec2 p, vec2 b) {
        vec2 d = abs(p) - b;
        return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
      }

      float sdRing(vec2 p, float r, float w) {
        return abs(length(p) - r) - w;
      }

      float line(vec2 p, vec2 a, vec2 b, float w) {
        vec2 pa = p - a;
        vec2 ba = b - a;
        float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
        return 1.0 - smoothstep(w, w + 0.006, length(pa - ba * h));
      }

      float glyphField(vec2 p) {
        float g = 0.0;
        g += 1.0 - smoothstep(0.0, 0.01, sdBox(p - vec2(-0.36, 0.08), vec2(0.035, 0.22)));
        g += line(p, vec2(-0.32, 0.27), vec2(-0.18, 0.27), 0.014);
        g += line(p, vec2(-0.32, 0.08), vec2(-0.20, 0.08), 0.014);
        g += line(p, vec2(-0.32, -0.11), vec2(-0.18, -0.11), 0.014);

        g += 1.0 - smoothstep(0.0, 0.01, sdRing(p - vec2(0.02, 0.08), 0.15, 0.018));
        g += line(p, vec2(0.12, -0.03), vec2(0.22, -0.14), 0.017);

        g += line(p, vec2(0.31, -0.12), vec2(0.40, 0.27), 0.018);
        g += line(p, vec2(0.49, -0.12), vec2(0.40, 0.27), 0.018);
        g += line(p, vec2(0.35, 0.03), vec2(0.46, 0.03), 0.014);
        return clamp(g, 0.0, 1.0);
      }

      float splatLayer(vec2 p, float focus) {
        float cellSize = mix(0.115, 0.038, focus);
        vec2 grid = p / cellSize;
        vec2 id = floor(grid);
        vec2 gv = fract(grid) - 0.5;
        float seed = hash(id);
        vec2 offset = vec2(hash(id + 7.1), hash(id + 19.7)) - 0.5;
        float radius = mix(0.09, 0.028, focus) * mix(0.65, 1.4, seed);
        vec2 wobble = 0.18 * vec2(sin(time * 0.9 + seed * 8.0), cos(time * 0.7 + seed * 11.0));
        float d = length(gv - offset * 0.42 - wobble * focus);
        return exp(-d * d / max(radius * radius, 0.0008));
      }

      void main() {
        vec2 uv = vUv;
        vec2 p = (uv * 2.0 - 1.0) * vec2(resolution.x / resolution.y, 1.0);
        vec2 m = (pointer * 2.0 - 1.0) * vec2(resolution.x / resolution.y, 1.0);

        float focusRadius = mix(0.34, 0.58, pressed);
        float distToFocus = distance(p, m);
        float focus = 1.0 - smoothstep(focusRadius, focusRadius + 0.28, distToFocus);

        vec2 flow = p;
        flow.x += 0.055 * sin(p.y * 9.0 + time * 1.1) * (1.0 - focus);
        flow.y += 0.035 * cos(p.x * 8.0 - time * 0.8) * (1.0 - focus);

        float membrane = 1.0 - smoothstep(0.012, 0.05, abs(sdBox(flow, vec2(0.78, 0.43))));
        float scan = 0.5 + 0.5 * sin((flow.y + time * 0.08) * 82.0);
        float glyph = glyphField(flow);
        float fineGrid = smoothstep(0.965, 1.0, sin((flow.x + flow.y) * 120.0));
        float splatA = splatLayer(p + vec2(0.0, time * 0.025), focus);
        float splatB = splatLayer(p * 1.4 - vec2(time * 0.018, 0.0), focus * 0.8);

        vec3 base = vec3(0.035, 0.055, 0.07);
        vec3 cool = vec3(0.18, 0.82, 0.88);
        vec3 warm = vec3(1.0, 0.76, 0.32);
        vec3 ink = vec3(0.83, 0.96, 0.92);

        vec3 color = base;
        color += cool * splatA * 0.22;
        color += warm * splatB * 0.13;
        color += membrane * vec3(0.04, 0.12, 0.15);
        color += membrane * scan * vec3(0.02, 0.08, 0.09) * (0.3 + focus);
        color += glyph * mix(vec3(0.08, 0.18, 0.20), ink, focus);
        color += fineGrid * focus * vec3(0.08, 0.45, 0.42);

        float halo = exp(-distToFocus * distToFocus / 0.12);
        color += halo * vec3(0.08, 0.24, 0.26);
        color += smoothstep(0.02, 0.0, abs(sdRing(p - m, focusRadius, 0.003))) * warm;

        float vignette = smoothstep(1.34, 0.2, length(p));
        color *= 0.65 + 0.55 * vignette;
        color = pow(color, vec3(0.92));

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function compile(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexShaderSource));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentShaderSource));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

    const position = gl.getAttribLocation(program, "position");
    const resolution = gl.getUniformLocation(program, "resolution");
    const pointer = gl.getUniformLocation(program, "pointer");
    const time = gl.getUniformLocation(program, "time");
    const pressed = gl.getUniformLocation(program, "pressed");

    const state = {
      pointerX: 0.54,
      pointerY: 0.52,
      targetX: 0.54,
      targetY: 0.52,
      pressed: 0
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.floor(window.innerWidth * dpr);
      const height = Math.floor(window.innerHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
        gl.viewport(0, 0, width, height);
      }
    }

    function updatePointer(event) {
      const rect = canvas.getBoundingClientRect();
      state.targetX = (event.clientX - rect.left) / rect.width;
      state.targetY = 1 - (event.clientY - rect.top) / rect.height;
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointermove", updatePointer);
    window.addEventListener("pointerdown", (event) => {
      updatePointer(event);
      state.pressed = 1;
    });
    window.addEventListener("pointerup", () => {
      state.pressed = 0;
    });

    function render(now) {
      resize();
      state.pointerX += (state.targetX - state.pointerX) * 0.12;
      state.pointerY += (state.targetY - state.pointerY) * 0.12;

      gl.useProgram(program);
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.enableVertexAttribArray(position);
      gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);
      gl.uniform2f(resolution, canvas.width, canvas.height);
      gl.uniform2f(pointer, state.pointerX, state.pointerY);
      gl.uniform1f(time, now * 0.001);
      gl.uniform1f(pressed, state.pressed);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
