<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOG Timeline Frustum Field</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #05070a;
      color: #eef7f2;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { width: 100vw; height: 100vh; display: block; }
    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: min(430px, calc(100vw - 36px));
      pointer-events: none;
    }
    .hud h1 { margin: 0 0 8px; font-size: 15px; letter-spacing: 0; }
    .hud p { margin: 0; color: #b9c9c1; font-size: 12px; line-height: 1.55; }
    .timeline {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 16px;
      height: 34px;
      border: 1px solid rgba(235, 248, 240, .26);
      background: rgba(255, 255, 255, .045);
      overflow: hidden;
    }
    .timeline::before {
      content: "";
      position: absolute;
      inset: 10px 12px;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,.28) 0 1px, transparent 1px 8%),
        linear-gradient(90deg, #6cf0bb, #f0d85c, #ff7268);
      mask: linear-gradient(90deg, #000 0 68%, transparent 68%);
      animation: scrub 4.5s linear infinite;
    }
    @keyframes scrub {
      from { transform: translateX(-18%); }
      to { transform: translateX(24%); }
    }
  </style>
</head>
<body>
<canvas id="gl"></canvas>
<div class="hud">
  <h1>SOG Timeline Frustum Field</h1>
  <p>SuperSplat v2.29.0 のタイムライン、360 書き出し、SPZ export、frustum-aware selection を、視錐台に沿って splat が編集履歴として残る WebGL スケッチに変換しました。</p>
</div>
<div class="timeline" aria-hidden="true"></div>
<script>
const canvas = document.getElementById("gl");
const gl = canvas.getContext("webgl", { antialias: false, alpha: false });
const vertexSource = `attribute vec2 position; void main(){ gl_Position = vec4(position,0.0,1.0); }`;
const fragmentSource = `
precision highp float;
uniform vec2 resolution;
uniform vec2 pointer;
uniform float time;
float hash(vec2 p){ return fract(sin(dot(p, vec2(41.7,289.3))) * 43758.5453); }
float lineDist(vec2 p, vec2 a, vec2 b){
  vec2 pa = p - a;
  vec2 ba = b - a;
  float h = clamp(dot(pa, ba) / dot(ba, ba), 0.0, 1.0);
  return length(pa - ba * h);
}
float splat(vec2 p, vec2 c, vec2 s, float r){
  vec2 q = p - c;
  float sn = sin(r);
  float cs = cos(r);
  q = mat2(cs, -sn, sn, cs) * q;
  q /= s;
  return exp(-dot(q, q) * 2.8);
}
vec3 grade(float t){
  vec3 ink = vec3(0.015,0.025,0.032);
  vec3 cyan = vec3(0.12,0.76,0.72);
  vec3 gold = vec3(0.95,0.74,0.22);
  vec3 coral = vec3(1.0,0.30,0.25);
  return mix(mix(ink, cyan, smoothstep(0.0,0.55,t)), mix(gold, coral, smoothstep(0.58,1.0,t)), smoothstep(0.46,0.94,t));
}
void main(){
  vec2 uv = (gl_FragCoord.xy * 2.0 - resolution) / min(resolution.x, resolution.y);
  vec2 m = (pointer * 2.0 - resolution) / min(resolution.x, resolution.y);
  float scrub = fract(time * 0.105);
  vec2 cam = vec2(-0.95 + 0.14 * sin(time * 0.31), -0.66);
  vec2 target = mix(vec2(0.55 * sin(time * 0.24), 0.34), m, 0.55);
  vec2 dir = normalize(target - cam);
  vec2 n = vec2(-dir.y, dir.x);
  float along = dot(uv - cam, dir);
  float spread = abs(dot(uv - cam, n)) / max(along, 0.05);
  float frustum = smoothstep(0.95, 0.18, spread) * smoothstep(-0.05, 0.16, along) * smoothstep(2.0, 0.9, along);
  float field = 0.0;
  float selected = 0.0;
  float ghost = 0.0;
  for(int i=0;i<42;i++){
    float fi = float(i);
    vec2 seed = vec2(hash(vec2(fi,2.0)), hash(vec2(fi,9.0)));
    float layer = floor(seed.x * 6.0);
    float beat = fract(scrub + layer / 6.0);
    vec2 base = vec2(seed.x * 2.8 - 1.4, seed.y * 1.6 - 0.62);
    base += 0.12 * vec2(sin(time * (0.12 + seed.x) + fi), cos(time * (0.09 + seed.y) + fi));
    float age = 1.0 - smoothstep(0.0, 0.78, abs(beat - seed.y));
    float inView = smoothstep(0.92, 0.18, abs(dot(base - cam, n)) / max(dot(base - cam, dir), 0.08));
    inView *= smoothstep(-0.04, 0.18, dot(base - cam, dir));
    float s = splat(uv, base, mix(vec2(0.12,0.035), vec2(0.055,0.018), inView), fi + time * 0.08);
    field += s * (0.25 + age * 0.65) * (0.35 + inView);
    selected += s * inView * smoothstep(0.22, 0.03, length(base - target));
    ghost += s * (1.0 - inView) * 0.45;
  }
  float leftEdge = lineDist(uv, cam, cam + dir * 1.8 + n * 0.52);
  float rightEdge = lineDist(uv, cam, cam + dir * 1.8 - n * 0.52);
  float centerRay = lineDist(uv, cam, cam + dir * 1.9);
  float timelineBands = smoothstep(0.018, 0.0, abs(fract((uv.x + time * 0.08) * 9.0) - 0.5));
  float exportRing = smoothstep(0.018, 0.0, abs(length(uv - target) - 0.22));
  vec3 color = grade(clamp(field * 0.52 + frustum * 0.42 + selected * 0.8, 0.0, 1.0));
  color += vec3(0.08,0.18,0.20) * ghost;
  color += vec3(0.45,0.98,0.84) * smoothstep(0.014, 0.0, min(leftEdge, rightEdge));
  color += vec3(1.0,0.78,0.24) * smoothstep(0.012, 0.0, centerRay) * 0.55;
  color += vec3(1.0,0.36,0.30) * exportRing;
  color += vec3(0.34,0.95,0.72) * timelineBands * frustum * 0.15;
  color *= smoothstep(1.45, 0.24, length(uv));
  gl_FragColor = vec4(color, 1.0);
}`;
function compile(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(shader));
  return shader;
}
const program = gl.createProgram();
gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexSource));
gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentSource));
gl.linkProgram(program);
if (!gl.getProgramParameter(program, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(program));
gl.useProgram(program);
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const position = gl.getAttribLocation(program, "position");
gl.enableVertexAttribArray(position);
gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);
const uniforms = {
  resolution: gl.getUniformLocation(program, "resolution"),
  pointer: gl.getUniformLocation(program, "pointer"),
  time: gl.getUniformLocation(program, "time")
};
const state = { pointer: [window.innerWidth * 0.63, window.innerHeight * 0.42] };
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.floor(window.innerWidth * dpr);
  canvas.height = Math.floor(window.innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
function setPointer(event){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  state.pointer[0] = event.clientX * dpr;
  state.pointer[1] = (window.innerHeight - event.clientY) * dpr;
}
window.addEventListener("resize", resize);
window.addEventListener("pointermove", setPointer);
resize();
function frame(now){
  gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
  gl.uniform2f(uniforms.pointer, state.pointer[0], state.pointer[1]);
  gl.uniform1f(uniforms.time, now * 0.001);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
