<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Reactive Field</title>
  <style>
    :root {
      --bg0: #060d15;
      --bg1: #122338;
      --panel: rgba(8, 18, 29, 0.82);
      --line: rgba(124, 224, 255, 0.14);
      --text: #ecf8ff;
      --muted: #9bb6c7;
      --accent: #7ce3ff;
      --accent2: #ffd86b;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(124, 224, 255, 0.16), transparent 24%),
        radial-gradient(circle at 82% 12%, rgba(255, 216, 107, 0.12), transparent 22%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(124, 224, 255, 0.1);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.35;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc7);
      color: #062334;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }

    .meta strong { color: var(--accent2); }

    .stage {
      position: relative;
      min-height: 680px;
      overflow: hidden;
      border-radius: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(9, 17, 28, 0.5), rgba(8, 14, 22, 0.92));
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px;
    }

    .badge, .hint {
      background: rgba(8, 18, 29, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--muted);
      max-width: 340px;
    }

    .badge strong { color: var(--text); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 520px; }
    }
  

    .sample-nav {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 30;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: min(92vw, 520px);
    }

    .sample-nav-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(8, 18, 28, 0.82);
      border: 1px solid rgba(124, 228, 255, 0.16);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      color: var(--text, #eef8ff);
      font: 600 0.9rem/1 "Avenir Next", "Hiragino Sans", sans-serif;
      white-space: nowrap;
    }

    .sample-nav-link:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 228, 255, 0.3);
    }

    @media (max-width: 720px) {
      .sample-nav {
        top: 12px;
        right: 12px;
        gap: 8px;
      }

      .sample-nav-link {
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <nav class="sample-nav" aria-label="Sample navigation">
    <a class="sample-nav-link" href="../days/2026-06-21.html">その日のページ / Day</a>
    <a class="sample-nav-link" href="../index.html">トップ / Home</a>
  </nav>
  <div class="layout">
    <aside class="panel">
      <h1>Audio Reactive Field</h1>
      <p>
        音量に応じてグリッドと発光フィールド全体が歪む、シェーダー発想寄りの最小サンプルです。
        マイク入力が使えれば実入力、使えなければデモ信号で動きます。
      </p>

      <div class="controls">
        <button class="primary" id="micButton">マイク入力を使う</button>
        <button class="secondary" id="demoButton">デモ信号で動かす</button>
      </div>

      <div class="meta">
        <div><strong>テーマ:</strong> 音反応 / フィールド歪み / シェーダー発想</div>
        <div><strong>最小機能:</strong> 音量で波紋、色、線密度を変える</div>
        <div><strong>次の拡張:</strong> GLSL化、周波数帯分離、ポストプロセス</div>
      </div>
    </aside>

    <main class="panel stage">
      <canvas id="canvas"></canvas>
      <div class="overlay">
        <div class="badge" id="status"><strong>現在:</strong> デモ信号で動作中</div>
        <div class="hint">
          次に足すなら、低域で大域変形、中域で線の密度、高域で発光ノイズを分けるのが筋です。
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let time = 0;

    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let mode = "demo";

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.floor(rect.width * DPR);
      height = Math.floor(rect.height * DPR);
      canvas.width = width;
      canvas.height = height;
    }

    function setStatus(text) {
      statusEl.innerHTML = `<strong>現在:</strong> ${text}`;
    }

    function getDemoLevel(t) {
      return Math.max(0.08, Math.sin(t * 1.2) * 0.3 + Math.sin(t * 2.6) * 0.18 + 0.34);
    }

    function getAudioLevel() {
      if (!analyser || !dataArray) return getDemoLevel(time);
      analyser.getByteFrequencyData(dataArray);
      let sum = 0;
      for (let i = 0; i < dataArray.length; i += 1) sum += dataArray[i];
      return Math.min(1, (sum / dataArray.length / 255) * 1.9);
    }

    async function startMic() {
      stopMic();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        mode = "mic";
        setStatus("マイク入力で動作中");
      } catch (error) {
        mode = "demo";
        setStatus("マイクを使えなかったためデモ信号へ切り替え");
      }
    }

    function stopMic() {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = null;
      analyser = null;
      dataArray = null;
    }

    function renderField(level) {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(6, 12, 20, 0.14)";
      ctx.fillRect(0, 0, width, height);

      const cols = 42;
      const rows = 28;
      const cellW = width / cols;
      const cellH = height / rows;
      const cx = width * 0.5;
      const cy = height * 0.5;

      const bloom = 40 + level * 120;
      const radius = 120 + level * 220;
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      grad.addColorStop(0, `rgba(124, 224, 255, ${0.12 + level * 0.18})`);
      grad.addColorStop(0.6, `rgba(255, 216, 107, ${0.04 + level * 0.08})`);
      grad.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 1 * DPR;
      ctx.strokeStyle = `rgba(124, 224, 255, ${0.1 + level * 0.18})`;
      ctx.shadowColor = `rgba(124, 224, 255, ${0.12 + level * 0.34})`;
      ctx.shadowBlur = bloom;

      for (let y = 0; y <= rows; y += 1) {
        ctx.beginPath();
        for (let x = 0; x <= cols; x += 1) {
          const px = x * cellW;
          const py = y * cellH;
          const dx = px - cx;
          const dy = py - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const wave = Math.sin(dist * 0.02 - time * 2.2) * level * 22;
          const bend = Math.cos((px * 0.01) + time * 1.4) * level * 9;
          const ny = py + wave + bend;
          if (x === 0) ctx.moveTo(px, ny);
          else ctx.lineTo(px, ny);
        }
        ctx.stroke();
      }

      for (let x = 0; x <= cols; x += 1) {
        ctx.beginPath();
        for (let y = 0; y <= rows; y += 1) {
          const px = x * cellW;
          const py = y * cellH;
          const dx = px - cx;
          const dy = py - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const wave = Math.cos(dist * 0.018 - time * 2.6) * level * 18;
          const bend = Math.sin((py * 0.012) + time * 1.1) * level * 8;
          const nx = px + wave + bend;
          if (y === 0) ctx.moveTo(nx, py);
          else ctx.lineTo(nx, py);
        }
        ctx.stroke();
      }

      ctx.shadowBlur = 0;

      for (let i = 0; i < 24; i += 1) {
        const a = (i / 24) * Math.PI * 2 + time * (0.2 + level * 0.4);
        const r = radius * (0.55 + (i % 5) * 0.08);
        const px = cx + Math.cos(a) * r;
        const py = cy + Math.sin(a) * r * 0.7;
        ctx.fillStyle = `hsla(${190 + level * 80 + i * 6}, 92%, ${58 + level * 14}%, ${0.16 + level * 0.34})`;
        ctx.beginPath();
        ctx.arc(px, py, 2 + level * 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function tick() {
      time += 0.016;
      const level = mode === "mic" ? getAudioLevel() : getDemoLevel(time);
      renderField(level);
      requestAnimationFrame(tick);
    }

    document.getElementById("micButton").addEventListener("click", startMic);
    document.getElementById("demoButton").addEventListener("click", () => {
      stopMic();
      mode = "demo";
      setStatus("デモ信号で動作中");
    });

    window.addEventListener("resize", resize);
    window.addEventListener("beforeunload", stopMic);

    resize();
    setStatus("デモ信号で動作中");
    tick();
  </script>
</body>
</html>
