<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temporal Hysteresis State Scope</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: #10120f;
      color: #eef2df;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      display: grid;
      gap: 7px;
      max-width: min(520px, calc(100vw - 36px));
      pointer-events: none;
      text-shadow: 0 1px 14px rgba(0, 0, 0, 0.46);
    }

    .title {
      font-size: 13px;
      letter-spacing: 0;
      text-transform: uppercase;
      color: #f7f0ce;
    }

    .readout {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 11px;
      line-height: 1.35;
      color: #dbe6d4;
    }

    .readout span {
      padding: 3px 7px;
      border: 1px solid rgba(238, 242, 223, 0.18);
      background: rgba(14, 18, 18, 0.48);
      border-radius: 4px;
    }

    .hint {
      font-size: 11px;
      color: rgba(238, 242, 223, 0.72);
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="hud">
    <div class="title">Temporal Hysteresis State Scope</div>
    <div class="readout">
      <span id="queue">queue 0.00</span>
      <span id="audio">impulse 0.00</span>
      <span id="lag">lag 0.00</span>
      <span id="tier">tier high</span>
    </div>
    <div class="hint">Move pointer: current target. Hold: charge/retry pressure. Space: synthetic upload spike.</div>
  </div>
  <script type="module">
    const canvas = document.querySelector("#gl");
    const gl = canvas.getContext("webgl", { antialias: false, alpha: false });
    if (!gl) throw new Error("WebGL is not available");

    const vertexSource = `
      attribute vec2 position;
      void main() {
        gl_Position = vec4(position, 0.0, 1.0);
      }
    `;

    const fragmentSource = `
      precision highp float;

      uniform vec2 uResolution;
      uniform vec2 uPointer;
      uniform vec2 uHistory;
      uniform float uTime;
      uniform float uDown;
      uniform float uQueue;
      uniform float uAudio;
      uniform float uLag;

      float hash(vec2 p) {
        p = fract(p * vec2(123.34, 456.21));
        p += dot(p, p + 45.32);
        return fract(p.x * p.y);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);
        return mix(
          mix(hash(i), hash(i + vec2(1.0, 0.0)), u.x),
          mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), u.x),
          u.y
        );
      }

      float ring(vec2 p, vec2 c, float r, float w) {
        return 1.0 - smoothstep(w, w + 0.012, abs(length(p - c) - r));
      }

      float lineSegment(vec2 p, vec2 a, vec2 b, float w) {
        vec2 pa = p - a;
        vec2 ba = b - a;
        float h = clamp(dot(pa, ba) / max(dot(ba, ba), 0.0001), 0.0, 1.0);
        return 1.0 - smoothstep(w, w + 0.006, length(pa - ba * h));
      }

      vec3 palette(float t) {
        vec3 a = vec3(0.08, 0.10, 0.09);
        vec3 b = vec3(0.36, 0.46, 0.36);
        vec3 c = vec3(0.92, 0.56, 0.22);
        vec3 d = vec3(0.20, 0.66, 0.78);
        vec3 e = vec3(0.74, 0.25, 0.42);
        return mix(mix(a, b, t), mix(c, d, sin(t * 3.14159) * 0.5 + 0.5), smoothstep(0.42, 0.92, t)) + e * pow(max(t - 0.72, 0.0), 2.0);
      }

      void main() {
        vec2 uv = gl_FragCoord.xy / uResolution.xy;
        vec2 p = (gl_FragCoord.xy * 2.0 - uResolution.xy) / min(uResolution.x, uResolution.y);
        vec2 pointer = (uPointer * 2.0 - 1.0) * vec2(uResolution.x / min(uResolution.x, uResolution.y), 1.0);
        vec2 history = (uHistory * 2.0 - 1.0) * vec2(uResolution.x / min(uResolution.x, uResolution.y), 1.0);

        vec2 grid = floor((uv + vec2(0.0, uTime * 0.018)) * vec2(18.0, 11.0));
        vec2 cell = fract((uv + vec2(0.0, uTime * 0.018)) * vec2(18.0, 11.0)) - 0.5;
        float id = hash(grid);
        float cellMask = smoothstep(0.48, 0.18, max(abs(cell.x), abs(cell.y)));

        float targetField = exp(-5.2 * length(p - pointer));
        float historyField = exp(-4.2 * length(p - history));
        float lagField = clamp(abs(targetField - historyField) * 2.8 + uLag * 0.65, 0.0, 1.0);
        float queueWave = smoothstep(0.15, 1.0, sin(dot(grid, vec2(0.9, 1.7)) + uTime * (1.4 + uQueue * 1.7)) * 0.5 + 0.5);
        float warmed = smoothstep(0.28, 0.92, historyField + queueWave * 0.24 + (1.0 - uQueue) * 0.24);
        float stale = smoothstep(0.25, 0.95, lagField + id * 0.22 + uQueue * 0.35);
        float retry = smoothstep(0.52, 0.88, noise(grid * 0.19 + uTime * 0.11) + uDown * 0.2 + uAudio * 0.18);

        float tile = cellMask * (0.23 + warmed * 0.42 + stale * 0.32);
        vec3 color = vec3(0.035, 0.045, 0.04);
        color += palette(warmed) * tile;
        color += vec3(0.98, 0.30, 0.24) * stale * cellMask * (0.28 + uQueue * 0.32);
        color += vec3(0.25, 0.78, 0.92) * retry * cellMask * (0.12 + uAudio * 0.34);

        float path = lineSegment(p, history, pointer, 0.009 + uLag * 0.012);
        color += vec3(1.0, 0.74, 0.28) * path * (0.25 + uLag * 0.8);
        color += vec3(0.95, 0.92, 0.72) * ring(p, pointer, 0.18 + uDown * 0.13 + uAudio * 0.05, 0.014);
        color += vec3(0.36, 0.82, 0.70) * ring(p, history, 0.29 + uQueue * 0.16, 0.018) * 0.68;
        color += vec3(0.92, 0.24, 0.45) * ring(p, mix(history, pointer, 0.48), 0.45 + uLag * 0.16, 0.008) * stale;

        float scan = smoothstep(0.018, 0.0, abs(fract(uv.y * 38.0 + uTime * 0.45 + uQueue) - 0.5));
        color += scan * vec3(0.06, 0.08, 0.05) * (0.8 + stale);

        float coarse = smoothstep(0.32, 1.0, uQueue + uLag * 0.5);
        float grain = hash(floor(gl_FragCoord.xy / mix(1.0, 5.0, coarse)) + uTime);
        color = mix(color, color * (0.65 + grain * 0.7), 0.2 + coarse * 0.45);

        float vignette = smoothstep(1.55, 0.24, length(p * vec2(0.75, 1.0)));
        color *= 0.52 + vignette * 0.76;
        color = pow(color, vec3(0.86));
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    function compile(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || "Shader compile failed");
      }
      return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, compile(gl.VERTEX_SHADER, vertexSource));
    gl.attachShader(program, compile(gl.FRAGMENT_SHADER, fragmentSource));
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program) || "Program link failed");
    }

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);

    const locPosition = gl.getAttribLocation(program, "position");
    const uniforms = {
      resolution: gl.getUniformLocation(program, "uResolution"),
      pointer: gl.getUniformLocation(program, "uPointer"),
      history: gl.getUniformLocation(program, "uHistory"),
      time: gl.getUniformLocation(program, "uTime"),
      down: gl.getUniformLocation(program, "uDown"),
      queue: gl.getUniformLocation(program, "uQueue"),
      audio: gl.getUniformLocation(program, "uAudio"),
      lag: gl.getUniformLocation(program, "uLag")
    };

    const state = {
      pointer: [0.5, 0.52],
      history: [0.5, 0.52],
      down: 0,
      queue: 0.25,
      impulse: 0,
      lag: 0
    };

    const queueEl = document.querySelector("#queue");
    const audioEl = document.querySelector("#audio");
    const lagEl = document.querySelector("#lag");
    const tierEl = document.querySelector("#tier");

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const width = Math.floor(innerWidth * dpr);
      const height = Math.floor(innerHeight * dpr);
      if (canvas.width !== width || canvas.height !== height) {
        canvas.width = width;
        canvas.height = height;
      }
      gl.viewport(0, 0, width, height);
    }

    function setPointer(event) {
      state.pointer[0] = event.clientX / Math.max(innerWidth, 1);
      state.pointer[1] = 1 - event.clientY / Math.max(innerHeight, 1);
    }

    addEventListener("pointermove", setPointer);
    addEventListener("pointerdown", (event) => {
      setPointer(event);
      state.down = 1;
      state.queue = Math.min(1, state.queue + 0.18);
    });
    addEventListener("pointerup", () => {
      state.down = 0;
    });
    addEventListener("keydown", (event) => {
      if (event.code === "Space") {
        event.preventDefault();
        state.impulse = 1;
        state.queue = Math.min(1, state.queue + 0.32);
      }
    });

    function scheduleIdleDrain() {
      const drain = () => {
        state.queue = Math.max(0, state.queue - 0.028);
        const cb = window.requestIdleCallback || ((fn) => setTimeout(fn, 90));
        cb(drain, { timeout: 250 });
      };
      drain();
    }

    function render(timeMs) {
      resize();
      const t = timeMs * 0.001;
      const syntheticAudio = Math.pow(Math.max(0, Math.sin(t * 2.7) * 0.5 + Math.sin(t * 5.1) * 0.25), 3.0);
      state.impulse = Math.max(syntheticAudio, state.impulse * 0.92);
      state.queue = Math.min(1, state.queue + state.down * 0.004 + state.impulse * 0.002);
      state.history[0] += (state.pointer[0] - state.history[0]) * 0.035;
      state.history[1] += (state.pointer[1] - state.history[1]) * 0.035;
      state.lag = Math.hypot(state.pointer[0] - state.history[0], state.pointer[1] - state.history[1]);

      gl.useProgram(program);
      gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
      gl.enableVertexAttribArray(locPosition);
      gl.vertexAttribPointer(locPosition, 2, gl.FLOAT, false, 0, 0);
      gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
      gl.uniform2f(uniforms.pointer, state.pointer[0], state.pointer[1]);
      gl.uniform2f(uniforms.history, state.history[0], state.history[1]);
      gl.uniform1f(uniforms.time, t);
      gl.uniform1f(uniforms.down, state.down);
      gl.uniform1f(uniforms.queue, state.queue);
      gl.uniform1f(uniforms.audio, state.impulse);
      gl.uniform1f(uniforms.lag, Math.min(state.lag * 3.2, 1));
      gl.drawArrays(gl.TRIANGLES, 0, 3);

      queueEl.textContent = `queue ${state.queue.toFixed(2)}`;
      audioEl.textContent = `impulse ${state.impulse.toFixed(2)}`;
      lagEl.textContent = `lag ${Math.min(state.lag * 3.2, 1).toFixed(2)}`;
      tierEl.textContent = `tier ${state.queue > 0.68 ? "low" : state.queue > 0.34 ? "mid" : "high"}`;

      requestAnimationFrame(render);
    }

    scheduleIdleDrain();
    requestAnimationFrame(render);
  </script>
</body>
</html>
