<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Band Reactor</title>
  <style>
    :root {
      --bg0: #060c14;
      --bg1: #13263c;
      --panel: rgba(8, 19, 29, 0.82);
      --line: rgba(126, 226, 255, 0.12);
      --text: #eef8ff;
      --muted: #9bb7c8;
      --accent: #7ce4ff;
      --accent2: #ffd868;
      --shadow: rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Avenir Next", "Hiragino Sans", sans-serif;
      background:
        radial-gradient(circle at 16% 18%, rgba(124, 228, 255, 0.16), transparent 24%),
        radial-gradient(circle at 82% 10%, rgba(255, 216, 104, 0.12), transparent 20%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
      overflow: hidden;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      min-height: 100vh;
      padding: 20px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(124, 228, 255, 0.1);
      border-radius: 22px;
      padding: 18px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 42px var(--shadow);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.35;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    button:hover { transform: translateY(-1px); }

    .primary {
      background: linear-gradient(135deg, var(--accent), #8effc7);
      color: #062334;
      font-weight: 700;
    }

    .secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .meta {
      display: grid;
      gap: 8px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      font-size: 0.88rem;
    }

    .meta strong { color: var(--accent2); }

    .stage {
      position: relative;
      min-height: 680px;
      overflow: hidden;
      border-radius: 22px;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(8, 16, 26, 0.46), rgba(8, 14, 22, 0.94));
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 18px;
    }

    .badge, .hint {
      background: rgba(8, 19, 29, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 0.88rem;
      line-height: 1.5;
      color: var(--muted);
      max-width: 360px;
    }

    .badge strong { color: var(--text); }

    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .stage { min-height: 520px; }
    }
  

    .home-link {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(8, 18, 28, 0.82);
      border: 1px solid rgba(124, 228, 255, 0.16);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      color: var(--text, #eef8ff);
      font: 600 0.9rem/1 "Avenir Next", "Hiragino Sans", sans-serif;
    }

    .home-link:hover {
      transform: translateY(-1px);
      border-color: rgba(124, 228, 255, 0.3);
    }

    @media (max-width: 720px) {
      .home-link {
        top: 12px;
        right: 12px;
        min-height: 38px;
        padding: 0 12px;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <a class="home-link" href="../index.html">トップへ戻る / Back to top</a>
  <div class="layout">
    <aside class="panel">
      <h1>Audio Band Reactor</h1>
      <p>
        低域・中域・高域を分けて反応させる最小サンプルです。
        低域は大きな波紋、中域はグリッドの変形、高域は発光粒子として画面に出します。
      </p>

      <div class="controls">
        <button class="primary" id="micButton">マイク入力を使う</button>
        <button class="secondary" id="demoButton">デモ信号で動かす</button>
      </div>

      <div class="meta" id="meta">
        <div><strong>テーマ:</strong> 音反応 / 周波数帯分離 / 空間演出</div>
        <div><strong>低域:</strong> 大域的な波紋</div>
        <div><strong>中域:</strong> グリッドの歪み</div>
        <div><strong>高域:</strong> 発光粒子</div>
      </div>
    </aside>

    <main class="panel stage">
      <canvas id="canvas"></canvas>
      <div class="overlay">
        <div class="badge" id="status"><strong>現在:</strong> デモ信号で動作中</div>
        <div class="hint">
          次に足すなら、各帯域ごとに `GLSL の別パス` や `ポストプロセス` を割り当てると見え方がかなり整理されます。
        </div>
      </div>
    </main>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    let width = 0;
    let height = 0;
    let time = 0;

    let audioContext = null;
    let analyser = null;
    let dataArray = null;
    let stream = null;
    let mode = "demo";

    const sparkleCount = 36;
    const sparkles = Array.from({ length: sparkleCount }, (_, i) => ({
      seed: Math.random() * 1000,
      angle: Math.random() * Math.PI * 2,
      radius: 120 + Math.random() * 240,
      size: 1 + Math.random() * 2.5
    }));

    function resize() {
      const rect = canvas.getBoundingClientRect();
      width = Math.floor(rect.width * DPR);
      height = Math.floor(rect.height * DPR);
      canvas.width = width;
      canvas.height = height;
    }

    function setStatus(text) {
      statusEl.innerHTML = `<strong>現在:</strong> ${text}`;
    }

    function getDemoBands(t) {
      return {
        low: Math.max(0.06, Math.sin(t * 0.8) * 0.28 + 0.34),
        mid: Math.max(0.08, Math.sin(t * 1.6 + 1.2) * 0.24 + 0.38),
        high: Math.max(0.05, Math.sin(t * 3.2 + 2.1) * 0.22 + 0.24)
      };
    }

    function getAudioBands() {
      if (!analyser || !dataArray) return getDemoBands(time);
      analyser.getByteFrequencyData(dataArray);
      const len = dataArray.length;
      const lowEnd = Math.floor(len * 0.16);
      const midEnd = Math.floor(len * 0.5);

      let low = 0;
      let mid = 0;
      let high = 0;

      for (let i = 0; i < lowEnd; i += 1) low += dataArray[i];
      for (let i = lowEnd; i < midEnd; i += 1) mid += dataArray[i];
      for (let i = midEnd; i < len; i += 1) high += dataArray[i];

      low = Math.min(1, (low / lowEnd) / 255 * 2.1);
      mid = Math.min(1, (mid / (midEnd - lowEnd)) / 255 * 2.0);
      high = Math.min(1, (high / (len - midEnd)) / 255 * 2.2);

      return { low, mid, high };
    }

    async function startMic() {
      stopMic();
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        source.connect(analyser);
        mode = "mic";
        setStatus("マイク入力で動作中");
      } catch (error) {
        mode = "demo";
        setStatus("マイクを使えなかったためデモ信号へ切り替え");
      }
    }

    function stopMic() {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
        stream = null;
      }
      if (audioContext && audioContext.state !== "closed") {
        audioContext.close();
      }
      audioContext = null;
      analyser = null;
      dataArray = null;
    }

    function render(bands) {
      const { low, mid, high } = bands;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "rgba(6, 12, 19, 0.15)";
      ctx.fillRect(0, 0, width, height);

      const cx = width * 0.5;
      const cy = height * 0.5;

      const lowRadius = 120 + low * 260;
      const lowGradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, lowRadius);
      lowGradient.addColorStop(0, `rgba(124, 224, 255, ${0.08 + low * 0.16})`);
      lowGradient.addColorStop(0.55, `rgba(255, 216, 104, ${0.04 + low * 0.08})`);
      lowGradient.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = lowGradient;
      ctx.beginPath();
      ctx.arc(cx, cy, lowRadius, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = `rgba(255, 216, 104, ${0.1 + low * 0.2})`;
      ctx.lineWidth = 1.4 * DPR;
      for (let i = 0; i < 4; i += 1) {
        ctx.beginPath();
        ctx.arc(cx, cy, lowRadius * (0.28 + i * 0.17), 0, Math.PI * 2);
        ctx.stroke();
      }

      const cols = 34;
      const rows = 22;
      const cellW = width / cols;
      const cellH = height / rows;
      ctx.strokeStyle = `rgba(124, 224, 255, ${0.1 + mid * 0.2})`;
      ctx.lineWidth = 1.0 * DPR;
      ctx.shadowColor = `rgba(124, 224, 255, ${0.12 + mid * 0.28})`;
      ctx.shadowBlur = 16 + mid * 28;

      for (let y = 0; y <= rows; y += 1) {
        ctx.beginPath();
        for (let x = 0; x <= cols; x += 1) {
          const px = x * cellW;
          const py = y * cellH;
          const wave = Math.sin(px * 0.014 + time * 1.9 + y * 0.23) * mid * 18;
          const pull = Math.cos((px - cx) * 0.012 + time * 1.3) * mid * 10;
          const ny = py + wave + pull;
          if (x === 0) ctx.moveTo(px, ny);
          else ctx.lineTo(px, ny);
        }
        ctx.stroke();
      }

      for (let x = 0; x <= cols; x += 1) {
        ctx.beginPath();
        for (let y = 0; y <= rows; y += 1) {
          const px = x * cellW;
          const py = y * cellH;
          const wave = Math.cos(py * 0.016 + time * 1.8 + x * 0.18) * mid * 14;
          const nx = px + wave;
          if (y === 0) ctx.moveTo(nx, py);
          else ctx.lineTo(nx, py);
        }
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      for (const s of sparkles) {
        const angle = s.angle + time * (0.5 + high * 1.8);
        const radius = s.radius + Math.sin(time * 2.2 + s.seed) * 16 + high * 120;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle * 1.2) * radius * 0.6;
        const size = s.size + high * 6;
        ctx.fillStyle = `hsla(${190 + high * 120 + s.seed % 80}, 96%, ${58 + high * 18}%, ${0.18 + high * 0.48})`;
        ctx.shadowColor = `rgba(124, 224, 255, ${0.12 + high * 0.44})`;
        ctx.shadowBlur = 14 + high * 34;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.shadowBlur = 0;
    }

    function tick() {
      time += 0.016;
      const bands = mode === "mic" ? getAudioBands() : getDemoBands(time);
      render(bands);
      requestAnimationFrame(tick);
    }

    document.getElementById("micButton").addEventListener("click", startMic);
    document.getElementById("demoButton").addEventListener("click", () => {
      stopMic();
      mode = "demo";
      setStatus("デモ信号で動作中");
    });

    window.addEventListener("resize", resize);
    window.addEventListener("beforeunload", stopMic);

    resize();
    setStatus("デモ信号で動作中");
    tick();
  </script>
</body>
</html>
