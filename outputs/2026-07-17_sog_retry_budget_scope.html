<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOG Streaming Retry Budget Scope</title>
  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #060806;
      color: #e7f5e9;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: 18px;
      top: 16px;
      max-width: 420px;
      padding: 12px 14px;
      border: 1px solid rgba(150, 220, 190, 0.28);
      background: rgba(6, 12, 8, 0.72);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      pointer-events: none;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 15px;
      letter-spacing: 0;
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 12px;
      line-height: 1.45;
      color: rgba(231, 245, 233, 0.78);
    }
  </style>
</head>
<body>
  <canvas id="gl"></canvas>
  <div class="hud">
    <h1>SOG Streaming Retry Budget Scope</h1>
    <p>Move the pointer to allocate detail budget. Hold to simulate drag/drop reload pressure. Green=valid LOD, amber=cooldown retry, magenta=stale diff, red=failed stream risk.</p>
  </div>

  <script type="x-shader/x-vertex" id="vertex-shader">
    attribute vec2 position;

    void main() {
      gl_Position = vec4(position, 0.0, 1.0);
    }
  </script>

  <script type="x-shader/x-fragment" id="fragment-shader">
    precision highp float;

    uniform vec2 resolution;
    uniform vec2 pointer;
    uniform float time;
    uniform float press;

    float hash(vec2 p) {
      p = fract(p * vec2(123.34, 456.21));
      p += dot(p, p + 45.32);
      return fract(p.x * p.y);
    }

    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      vec2 u = f * f * (3.0 - 2.0 * f);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
    }

    float sdBox(vec2 p, vec2 b) {
      vec2 d = abs(p) - b;
      return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
    }

    float ring(vec2 p, vec2 c, float r, float w) {
      return 1.0 - smoothstep(w, w * 2.0, abs(length(p - c) - r));
    }

    float lens(vec2 p, vec2 c, float r) {
      return smoothstep(r, r * 0.42, length(p - c));
    }

    float splat(vec2 p, vec2 c, vec2 axis, float angle) {
      float s = sin(angle);
      float co = cos(angle);
      mat2 m = mat2(co, -s, s, co);
      vec2 q = m * (p - c);
      return exp(-dot(q / axis, q / axis));
    }

    float digitBars(vec2 p, vec2 c, float phase) {
      vec2 q = p - c;
      float v = 0.0;
      for (int i = 0; i < 5; i++) {
        float x = -0.08 + float(i) * 0.04;
        float h = 0.022 + 0.018 * sin(phase + float(i) * 1.9);
        float d = sdBox(q - vec2(x, 0.0), vec2(0.008, h));
        v += 1.0 - smoothstep(0.0, 0.006, d);
      }
      return clamp(v, 0.0, 1.0);
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / resolution.xy;
      vec2 p = (gl_FragCoord.xy * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
      vec2 mp = (pointer * 2.0 - resolution.xy) / min(resolution.x, resolution.y);
      mp.y *= -1.0;

      vec2 grid = floor((p + 1.22) / 0.28);
      vec2 local = fract((p + 1.22) / 0.28) - 0.5;
      float cellId = hash(grid + 8.0);
      float tile = 1.0 - smoothstep(0.0, 0.012, sdBox(local, vec2(0.46, 0.46)));
      float border = 1.0 - smoothstep(0.0, 0.018, abs(sdBox(local, vec2(0.46, 0.46))));

      float focus = lens(p, mp, 0.52 + 0.08 * press);
      vec2 predictedCenter = vec2(0.42 * sin(time * 0.28), 0.34 * cos(time * 0.21));
      float predicted = lens(p, predictedCenter, 0.44);
      float diff = abs(focus - predicted);

      float lodWave = sin(time * 0.9 + grid.x * 0.9 - grid.y * 0.55);
      float lodHigh = smoothstep(0.35, 0.92, focus + 0.22 * lodWave);
      float lodMid = smoothstep(0.22, 0.75, predicted + 0.18 * noise(grid + time * 0.08));
      float cooldown = smoothstep(0.52, 0.94, noise(grid * 1.7 + vec2(time * 0.11, -time * 0.07)));
      float reloadPressure = smoothstep(0.18, 0.78, diff + press * 0.35);
      float failed = smoothstep(0.74, 0.98, cooldown * reloadPressure * (0.55 + cellId));
      float valid = clamp(tile * (0.35 + 0.65 * lodHigh) * (1.0 - failed * 0.7), 0.0, 1.0);

      float splats = 0.0;
      for (int i = 0; i < 42; i++) {
        float fi = float(i);
        vec2 g = vec2(mod(fi, 7.0), floor(fi / 7.0));
        vec2 c = (g - vec2(3.0, 2.5)) * 0.31;
        c += 0.045 * vec2(sin(time * 0.31 + fi * 2.2), cos(time * 0.26 + fi * 1.4));
        float size = 0.55 + 0.45 * hash(g);
        splats += splat(p, c, vec2(0.055 + 0.05 * size, 0.018 + 0.032 * lodMid), fi + time * 0.12);
      }
      splats = clamp(splats, 0.0, 1.8);

      float dragAperture = ring(p, mp, 0.52 + press * 0.08, 0.012);
      float retryPulse = border * cooldown * (0.45 + 0.55 * sin(time * 7.0 + grid.x));
      float depthGate = digitBars(p, vec2(-0.73, -0.72), time * 2.2) * smoothstep(0.2, 0.9, valid + focus);
      float staleResidue = diff * (0.35 + 0.65 * cooldown) * tile;
      float scan = 0.045 * sin((uv.y + time * 0.035) * 260.0);

      vec3 bg = mix(vec3(0.018, 0.025, 0.018), vec3(0.035, 0.045, 0.038), uv.y);
      vec3 color = bg + splats * vec3(0.08, 0.12, 0.105);
      color += valid * vec3(0.1, 0.68, 0.38);
      color += lodMid * tile * vec3(0.08, 0.18, 0.12);
      color += retryPulse * vec3(1.0, 0.62, 0.16);
      color += staleResidue * vec3(0.72, 0.2, 0.95);
      color += failed * tile * vec3(1.0, 0.08, 0.06);
      color += focus * splats * vec3(0.05, 0.52, 0.95);
      color += predicted * splats * vec3(0.84, 0.55, 0.12) * 0.62;
      color += dragAperture * vec3(0.74, 1.0, 0.82);
      color += ring(p, predictedCenter, 0.44, 0.01) * vec3(1.0, 0.7, 0.22);
      color += depthGate * vec3(1.0, 0.95, 0.43);
      color += scan;
      color = pow(max(color, 0.0), vec3(0.92));

      gl_FragColor = vec4(color, 1.0);
    }
  </script>

  <script>
    const canvas = document.getElementById("gl");
    const gl = canvas.getContext("webgl", { antialias: false, preserveDrawingBuffer: false });
    const pointer = { x: window.innerWidth * 0.58, y: window.innerHeight * 0.42, down: 0 };

    if (!gl) {
      document.body.innerHTML = "<p>WebGL is not available in this browser.</p>";
      throw new Error("WebGL unavailable");
    }

    function compile(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    const vertex = compile(gl.VERTEX_SHADER, document.getElementById("vertex-shader").textContent);
    const fragment = compile(gl.FRAGMENT_SHADER, document.getElementById("fragment-shader").textContent);
    const program = gl.createProgram();
    gl.attachShader(program, vertex);
    gl.attachShader(program, fragment);
    gl.linkProgram(program);
    if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(program));
    }
    gl.useProgram(program);

    const buffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

    const position = gl.getAttribLocation(program, "position");
    gl.enableVertexAttribArray(position);
    gl.vertexAttribPointer(position, 2, gl.FLOAT, false, 0, 0);

    const uniforms = {
      resolution: gl.getUniformLocation(program, "resolution"),
      pointer: gl.getUniformLocation(program, "pointer"),
      time: gl.getUniformLocation(program, "time"),
      press: gl.getUniformLocation(program, "press")
    };

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const w = Math.floor(window.innerWidth * dpr);
      const h = Math.floor(window.innerHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w;
        canvas.height = h;
        gl.viewport(0, 0, w, h);
      }
    }

    function setPointer(event) {
      const touch = event.touches && event.touches[0];
      const point = touch || event;
      pointer.x = point.clientX;
      pointer.y = point.clientY;
    }

    window.addEventListener("pointermove", setPointer);
    window.addEventListener("pointerdown", (event) => {
      pointer.down = 1;
      setPointer(event);
    });
    window.addEventListener("pointerup", () => {
      pointer.down = 0;
    });
    window.addEventListener("touchmove", setPointer, { passive: true });
    window.addEventListener("resize", resize);

    function frame(now) {
      resize();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      gl.uniform2f(uniforms.resolution, canvas.width, canvas.height);
      gl.uniform2f(uniforms.pointer, pointer.x * dpr, pointer.y * dpr);
      gl.uniform1f(uniforms.time, now * 0.001);
      gl.uniform1f(uniforms.press, pointer.down);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
